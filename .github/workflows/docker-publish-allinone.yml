name: Build and Deploy Allinone

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/quocdatads4/unla/allinone

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: vars
        shell: bash
        run: |
          TAGS="${IMAGE_NAME}:sha-${GITHUB_SHA::7}"

          if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "main" ]]; then
            TAGS="${TAGS}"$'\n'"${IMAGE_NAME}:edge"
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAGS="${TAGS}"$'\n'"${IMAGE_NAME}:${GITHUB_REF_NAME}"
            TAGS="${TAGS}"$'\n'"${IMAGE_NAME}:stable"
          fi

          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push allinone image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/allinone/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.vars.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/quocdatads4/Unla
            org.opencontainers.image.revision=${{ github.sha }}

  deploy-prod:
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Validate Dokploy secrets
        shell: bash
        env:
          DOKPLOY_BASE_URL: ${{ secrets.DOKPLOY_BASE_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_APPLICATION_ID: ${{ secrets.DOKPLOY_APPLICATION_ID }}
        run: |
          missing=0
          for name in DOKPLOY_BASE_URL DOKPLOY_API_KEY DOKPLOY_APPLICATION_ID; do
            if [[ -z "${!name}" ]]; then
              echo "Missing required secret: ${name}" >&2
              missing=1
            fi
          done
          if [[ "${missing}" -ne 0 ]]; then
            exit 1
          fi

      - name: Trigger Dokploy deployment
        env:
          DOKPLOY_BASE_URL: ${{ secrets.DOKPLOY_BASE_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_APPLICATION_ID: ${{ secrets.DOKPLOY_APPLICATION_ID }}
        run: |
          curl --fail --show-error --silent \
            -X POST "${DOKPLOY_BASE_URL}/api/application.deploy" \
            -H "accept: application/json" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${DOKPLOY_API_KEY}" \
            -d "{\"applicationId\":\"${DOKPLOY_APPLICATION_ID}\"}"
