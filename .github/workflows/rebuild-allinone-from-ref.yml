name: Rebuild allinone từ ref chỉ định

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref cần build, ví dụ v0.9.2 hoặc main"
        required: true
        default: "v0.9.2"
        type: string
      version_tag:
        description: "Tag image version muốn publish thêm, ví dụ v0.9.2-dat1"
        required: false
        type: string
      publish_stable:
        description: "Gán lại tag stable sau khi build xong"
        required: false
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/quocdatads4/unla/allinone

jobs:
  rebuild-and-push:
    name: Build lại image từ ref đã chọn
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout đúng ref
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.git_ref }}

      - name: Khởi tạo Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Đăng nhập GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tính toán tag image
        id: vars
        shell: bash
        env:
          INPUT_VERSION_TAG: ${{ github.event.inputs.version_tag }}
          INPUT_PUBLISH_STABLE: ${{ github.event.inputs.publish_stable }}
        run: |
          set -euo pipefail
          SHORT_SHA="$(git rev-parse --short HEAD)"
          TAGS="${IMAGE_NAME}:sha-${SHORT_SHA}"

          if [[ -n "${INPUT_VERSION_TAG}" ]]; then
            TAGS="${TAGS}"$'\n'"${IMAGE_NAME}:${INPUT_VERSION_TAG}"
          fi

          if [[ "${INPUT_PUBLISH_STABLE}" == "true" ]]; then
            TAGS="${TAGS}"$'\n'"${IMAGE_NAME}:stable"
          fi

          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

          echo "short_sha=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Build và đẩy image allinone
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/allinone/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.vars.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/quocdatads4/Unla
            org.opencontainers.image.revision=${{ github.event.inputs.git_ref }}

      - name: Tóm tắt kết quả
        shell: bash
        env:
          INPUT_GIT_REF: ${{ github.event.inputs.git_ref }}
          INPUT_VERSION_TAG: ${{ github.event.inputs.version_tag }}
          INPUT_PUBLISH_STABLE: ${{ github.event.inputs.publish_stable }}
          SHORT_SHA: ${{ steps.vars.outputs.short_sha }}
        run: |
          {
            echo "## Rebuild allinone result"
            echo ""
            echo "- Git ref: \

default`
${INPUT_GIT_REF}
`"
            echo "- Short SHA: \

default`
${SHORT_SHA}
`"
            echo "- Version tag: \

default`
${INPUT_VERSION_TAG:-<không publish tag version>}
`"
            echo "- Publish stable: \

default`
${INPUT_PUBLISH_STABLE}
`"
            echo "- Image: \

default`
${IMAGE_NAME}
`"
          } >> "$GITHUB_STEP_SUMMARY"
